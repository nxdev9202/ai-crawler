name: Build Windows MSI

# main/master 푸시 또는 수동 실행(Actions 탭 → Run workflow) 시 빌드
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # GitHub Releases 발행에 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 1) 백엔드를 단일 실행파일로 번들 (PyInstaller)
      #    channel=chrome(사용자 PC의 Chrome) 사용이라 chromium 다운로드는 불필요
      - name: Build backend (PyInstaller)
        working-directory: backend
        run: |
          python -m venv .venv
          .venv\Scripts\python -m pip install --upgrade pip
          .venv\Scripts\pip install -r requirements.txt
          .venv\Scripts\pip install pyinstaller
          .venv\Scripts\pyinstaller ai-crawler-backend.spec

      - name: Check backend bundle
        working-directory: backend
        run: |
          if (-Not (Test-Path "dist\ai-crawler-backend\ai-crawler-backend.exe")) {
            Write-Error "백엔드 exe 번들 실패"; exit 1
          }

      # 2) Electron 앱(NSIS) 생성 + GitHub Releases 발행 + 코드서명 + 자동업데이트 토큰 주입
      - name: Build & publish (NSIS)
        working-directory: electron
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}        # electron-builder 릴리스 발행용
          UPDATE_TOKEN: ${{ secrets.UPDATE_TOKEN }}    # 앱 내장 읽기전용 토큰(자동업데이트 다운로드용)
        run: |
          npm install
          # 버전 자동 증가(1.0.<run_number>) → 클라이언트가 업데이트 감지
          npm version 1.0.${{ github.run_number }} --no-git-tag-version --allow-same-version
          # main.js의 플레이스홀더에 읽기전용 토큰 주입(리터럴 치환 - 정규식 변형 방지)
          $c = Get-Content main.js -Raw
          $c = $c.Replace('__UPDATE_TOKEN__', $env:UPDATE_TOKEN)
          Set-Content -Path main.js -Value $c -NoNewline -Encoding utf8
          npm run publish

      # 3) 설치본 산출물 업로드(Actions에서도 다운로드 가능)
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: NXaiCrawler-Installer
          path: electron/release/*.exe
          if-no-files-found: error
